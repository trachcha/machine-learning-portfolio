name: Run notebooks

on:
  push:
    branches: [main]
    paths:
      - "projects/**/*.ipynb"
      - "projects/**/data/**"
      - "projects/**/requirements.txt"
      - "common/**"
      - "requirements.txt"
      - ".github/workflows/run-notebooks.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: run-notebooks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  execute:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          for req in projects/*/requirements.txt; do
            pip install -r "$req"
          done

      - name: Execute project notebooks
        run: |
          set -euo pipefail

          # Do not set MPLBACKEND=Agg here — it prevents figures from being
          # embedded as image/png outputs in the executed notebooks.
          # Jupyter's inline backend captures plt.show() into cell outputs.

          # Add new project notebooks here as the portfolio grows.
          NOTEBOOKS=(
            "projects/fashion-coat-dress-classification/notebooks/fashion_coat_dress_classification.ipynb"
            "projects/titanic-survival-classification/notebooks/titanic_survival_classification.ipynb"
          )

          for nb in "${NOTEBOOKS[@]}"; do
            echo "Executing $nb"
            jupyter nbconvert \
              --to notebook \
              --execute \
              --inplace \
              --ExecutePreprocessor.timeout=14400 \
              --ExecutePreprocessor.kernel_name=python3 \
              "$nb"
          done

      - name: Commit notebook outputs
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            projects/**/*.ipynb \
            projects/**/reports/figures/** \
            || true

          if git diff --cached --quiet; then
            echo "No notebook or figure changes to commit."
            exit 0
          fi

          git commit -m "Execute notebooks [skip ci]"

          # Rebase onto latest main in case other commits landed during the long notebook run
          git pull --rebase origin main
          git push origin HEAD:main
